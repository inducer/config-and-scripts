listen_host: "127.0.0.1"
listen_port: 8000

backends:
  vllm-a:
    base_url: http://10.0.0.1:8000
    api_key: UPSTREAM_KEY_A
  vllm-b:
    base_url: http://10.0.0.2:8000
    api_key: UPSTREAM_KEY_B

client_keys:
  client-key-1:
    allowed_models:
      - "model*"
      - "model-b"
    allowed_backends:
      - vllm-a
      - vllm-b
  client-key-2:
    allowed_models:
      - "other-model*"
    allowed_backends:
      - vllm-a
